# Optimized Codemagic configuration for Capacitor iOS Release & TestFlight


workflows:
  ios-release:
    name: HealthMatters Native Build
    max_build_duration: 120
    instance_type: mac_mini_m2

integrations:
  app_store_connect: "HEALTHMATTERSHM"

environment:
  ios_signing:
    distribution_type: app_store
    bundle_identifier: com.despia.healthmatterhm

  groups:
    - apple_auth_hm

  vars:
    XCODE_WORKSPACE: "ios/App/App.xcworkspace"
    XCODE_SCHEME: "App"
    BUNDLE_ID: "com.despia.healthmatterhm"
    DEVELOPMENT_TEAM: "JBMD9M6ZPC"

  node: 20.11.0
  xcode: latest

scripts:
  - name: Install Node modules
    script: |
      npm install

  - name: Build Web App
    script: |
      npm run build

  - name: Sync Capacitor
    script: |
      npx cap sync ios

  - name: Install CocoaPods
    script: |
      cd ios/App
      pod install
      cd ../..

  - name: Set up code signing
    script: |
      xcode-project use-profiles

  - name: Build IPA for Distribution
    script: |
      xcode-project build-ipa \
        --workspace "$XCODE_WORKSPACE" \
        --scheme "$XCODE_SCHEME"

artifacts:
  - build/ios/ipa/*.ipa

publishing:
  app_store_connect:
    auth: integration
    submit_to_testflight: true