workflows:
  native-build:
    name: HealthMatters Native Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Clean and Install dependencies
        script: | 
          # Remove existing artifacts
          rm -rf node_modules package-lock.json
          
          # Install core dependencies first
          npm install @capacitor/core@6.2.0 @capacitor/cli@6.2.0 --save
          
          # Install iOS platform matching the core version (v6)
          # We use --legacy-peer-deps to ignore the strict check failures
          npm install @capacitor/ios@6.2.0 --save --legacy-peer-deps
          
          # Install other plugins at their v6 compatible versions
          npm install @capacitor/keyboard@6.0.0 @capacitor/status-bar@6.0.0 @capacitor/app@6.0.0 --save --legacy-peer-deps
          
          # Final full install to catch anything else
          npm install --legacy-peer-deps
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: CocoaPods Install
        script: |
          cd ios/App
          pod install
      - name: Build iOS (Debug)
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            build CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/iphoneos/*.app