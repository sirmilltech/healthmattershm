workflows:
  ios-release:
    name: HealthMatters Native Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "HEALTHMATTERSHM"
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.despia.healthmatterhm
      groups:
        - apple_auth_hm
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.despia.healthmatterhm"
        DEVELOPMENT_TEAM: "JBMD9M6ZPC"
      node: 20.11.0
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Commit and Push Changes
        script: |
          # Configure Git User
          git config user.email "builder@codemagic.io"
          git config user.name "Codemagic Builder"
          
          # Stage changes (Capacitor often modifies project.pbxproj)
          git add .
          
          # Commit only if there are changes to avoid script failure
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: automatic capacitor sync [skip ci]"
            
            # Push using the SSH key or Auth token configured in your repo settings
            # This assumes your repository is set up with write access
            git push origin $CM_BRANCH
          else
            echo "No changes to commit"
          fi
      - name: Set up code signing
        script: | 
          xcode-project use-profiles
      - name: Build IPA for Distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM CODE_SIGN_STYLE=Manual" \
            --export-flags="method=app-store"
            
    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true