# Corrected build arguments and Git push logic
workflows:
  ios-release:
    name: HealthMatters Native Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "HEALTHMATTERSHM"
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.despia.healthmatterhm
      groups:
        - apple_auth_hm
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.despia.healthmatterhm"
        DEVELOPMENT_TEAM: "JBMD9M6ZPC"
      node: 20.11.0
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA for Distribution
        script: |
          # Removed --configuration as it caused an error
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

      - name: Push changes to repository
        script: |
          # Configure Git Identity
          git config --global user.email "builder@codemagic.io"
          git config --global user.name "Codemagic Builder"
          
          # Add all changes (pbxproj, capacitor files, etc)
          git add .
          
          # Check for changes and push if they exist
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: automatic capacitor sync [skip ci]"
            # Pushes to current branch. [skip ci] prevents infinite build loops.
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
            
    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true