workflows:
  ios-release:
    name: HealthMatters Native Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "HEALTHMATTERSHM"
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.despia.healthmatterhm
      groups:
        - apple_auth_hm
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.despia.healthmatterhm"
        DEVELOPMENT_TEAM: "JBMD9M6ZPC"
        # 1. GENERATE A GITHUB PAT (Personal Access Token) with 'repo' scope
        # 2. ADD IT TO CODEMAGIC UI: Settings > Environment Variables
        # 3. NAME IT: GITHUB_TOKEN
      node: 20.11.0
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Commit and Push Changes
        script: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "Error: GITHUB_TOKEN is not set in environment variables."
            exit 1
          fi

          # Configure Git User
          git config user.email "builder@codemagic.io"
          git config user.name "Codemagic Builder"
          
          # Stage changes
          git add .
          
          # Commit only if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: automatic capacitor sync [skip ci]"
            
            # Re-construct the remote URL with the token for authentication
            # Format: https://<token>@github.com/owner/repo.git
            REMOTE_URL="https://$GITHUB_TOKEN@github.com/sirmilltech/healthmattershm.git"
            
            git push "$REMOTE_URL" HEAD:$CM_BRANCH
          else
            echo "No changes to commit"
          fi
      - name: Set up code signing
        script: | 
          xcode-project use-profiles
      - name: Build IPA for Distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM CODE_SIGN_STYLE=Manual" \
            --export-flags="method=app-store"
            
    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true