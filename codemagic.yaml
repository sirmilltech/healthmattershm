workflows:
  ios-release:
    name: HealthMatters Native Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "HEALTHMATTERSHM"

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.despia.healthmatterhm
      groups:
        - apple_auth_hm
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        # The variables below are used by 'use-profiles' automatically
        APP_STORE_APPLE_ID: "YOUR_APPLE_ID_NUMERIC" 
      node: 20.11.0
      xcode: latest

    scripts:
      - name: Install Node modules
        script: |
          npm install

      - name: Build Web App
        script: |
          npm run build

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Setup Code Signing
        script: |
          # This single command replaces the manual keychain/plist logic.
          # It fetches profiles from Apple and generates the required export_options.plist
          xcode-project use-profiles

      - name: Build and Archive
        script: |
          # We remove the manual archive-flags because use-profiles 
          # handles the environment configuration automatically.
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true