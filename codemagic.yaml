workflows:
  native-build:
    name: HealthMatters Native Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Clean and Install dependencies
        script: | 
          # Remove any existing nodes and locks to prevent conflicts
          rm -rf node_modules package-lock.json
          npm install
          # Force install the iOS platform package
          npm install @capacitor/ios@latest --save
      - name: Capacitor Sync
        script: |
          # If the ios folder exists but isn't recognized, we add it explicitly
          # 'npx cap add ios' will fail if already present, so we use 'sync' 
          # but ensure the dependency is definitely linked first.
          npx cap sync ios
      - name: CocoaPods Install
        script: |
          cd ios/App
          pod install
      - name: Build iOS (Debug)
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            build CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/iphoneos/*.app