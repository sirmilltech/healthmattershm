# Optimized for Capacitor iOS Release & Distribution
workflows:
  ios-release:
    name: HealthMatters Native Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - app_store_credentials # Ensure this group exists in your Codemagic Environment variables
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA for Distribution
        script: |
          # Changed from 'debug' to 'release' to generate the .ipa file
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --mode release \
            --archive-flags="-allowProvisioningUpdates"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true