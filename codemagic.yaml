workflows:
  ios-release:
    name: HealthMatters Native Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "HEALTHMATTERSHM"

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.despia.healthmatterhm
      groups:
        - apple_auth_hm
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.despia.healthmatterhm"
        DEVELOPMENT_TEAM: "JBMD9M6ZPC"
      node: 20.11.0
      xcode: latest

    scripts:
      - name: Install Node modules
        script: |
          npm install

      - name: Build Web App
        script: |
          npm run build

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..

      - name: Setup Code Signing
        script: |
          # Initialize and set as default keychain
          keychain initialize
          
          # Install Certificate
          if [ -n "$CERTIFICATE_DATA" ]; then
            echo "$CERTIFICATE_DATA" | base64 --decode > /tmp/certificate.p12
            keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERT_PASSWORD"
          fi
          
          # Install Provisioning Profile
          if [ -n "$PROVISIONING_PROFILE_DATA" ]; then
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            echo "$PROVISIONING_PROFILE_DATA" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision
          fi

          # Use PlistBuddy to extract the exact Profile Name and UUID
          # We use security cms to decode the profile first
          DECODED_PROV="/tmp/decoded.plist"
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision > "$DECODED_PROV"
          
          PROV_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$DECODED_PROV")
          PROV_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$DECODED_PROV")
          
          echo "export PROV_NAME=\"$PROV_NAME\"" >> $CM_ENV
          echo "export PROV_UUID=\"$PROV_UUID\"" >> $CM_ENV
          
          # List certificates to verify installation in logs
          security find-identity -v -p codesigning

      - name: Build and Archive
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PROVISIONING_PROFILE="$PROV_UUID" \
            archive

      - name: Export IPA
        script: |
          mkdir -p build/ios/ipa

          cat <<EOF > exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$DEVELOPMENT_TEAM</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROV_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/ios/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist exportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true