workflows:
  ios-release:
    name: HealthMatters Native Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "HEALTHMATTERSHM"
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.despia.healthmatterhm
      groups:
        - apple_auth_hm
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.despia.healthmatterhm"
        DEVELOPMENT_TEAM: "JBMD9M6ZPC"
      node: 20.11.0
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA for Distribution
        script: |
          # Use xcode-project build-ipa but pass the environment variables 
          # generated by 'use-profiles' into the archive flags.
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM CODE_SIGN_STYLE=Manual"

      - name: Push changes to repository
        script: |
          git config --global user.email "builder@codemagic.io"
          git config --global user.name "Codemagic Builder"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: automatic capacitor sync [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
            
    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true